<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A2A Treasury Network — {% block title %}{% endblock %}</title>
    <meta name="description"
        content="AI-native autonomous B2B trade marketplace for Indian SMEs — powered by Algorand, x402 Protocol, and Google A2A">

    <!-- TailwindCSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#6366f1',
                            dark: '#4f46e5',
                            light: '#818cf8'
                        },
                        algo: '#00d4aa',
                        buyer: '#3b82f6',
                        seller: '#ef4444',
                        agreed: '#22c55e'
                    }
                }
            }
        }
    </script>

    <!-- HTMX CDN -->
    <script src="https://unpkg.com/htmx.org@1.9.10" defer></script>

    <!-- Alpine.js CDN -->
    <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            background: #0f1117;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            transition: all 0.3s ease;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
        }

        .offer-row-buyer {
            animation: slideRight 0.4s ease-out;
        }

        .offer-row-seller {
            animation: slideLeft 0.4s ease-out;
        }

        @keyframes slideRight {
            from {
                opacity: 0;
                transform: translateX(-20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes slideLeft {
            from {
                opacity: 0;
                transform: translateX(20px);
            }

            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .fade-in {
            animation: fadeIn 0.5s ease-out;
        }

        .pulse-dot {
            animation: pulse 1.5s cubic-bezier(0, 0, 0.2, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.5;
            }
        }

        .algo-glow {
            box-shadow: 0 0 20px rgba(0, 212, 170, 0.3);
        }

        .brand-glow {
            box-shadow: 0 0 30px rgba(99, 102, 241, 0.2);
        }

        .btn-primary {
            background: linear-gradient(135deg, #6366f1 0%, #4f46e5 100%);
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }

        .btn-buyer {
            background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
            transition: all 0.3s ease;
        }

        .btn-buyer:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(59, 130, 246, 0.4);
        }

        .btn-seller {
            background: linear-gradient(135deg, #ef4444 0%, #dc2626 100%);
            transition: all 0.3s ease;
        }

        .btn-seller:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 20px rgba(239, 68, 68, 0.4);
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="number"],
        select {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 8px;
            padding: 0.6rem 1rem;
            color: #e5e7eb;
            transition: border-color 0.2s;
        }

        input:focus,
        select:focus {
            outline: none;
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.15);
        }

        input[type="range"] {
            -webkit-appearance: none;
            height: 8px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 4px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 20px;
            height: 20px;
            background: #6366f1;
            border-radius: 50%;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(99, 102, 241, 0.5);
        }

        ::-webkit-scrollbar {
            width: 6px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }
    </style>
    {% block extra_head %}{% endblock %}
</head>

<body class="text-gray-100 min-h-screen">

    <!-- NAV -->
    <nav class="border-b border-gray-800 px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand flex items-center justify-center text-sm font-bold brand-glow">A2
            </div>
            <span class="font-semibold text-gray-100">A2A Treasury Network</span>
            <span class="text-xs px-2 py-0.5 rounded-full bg-algo/20 text-algo border border-algo/30">Algorand
                Testnet</span>
        </div>
        <div class="flex items-center gap-4 text-sm text-gray-400">
            <a href="/ui/login" class="hover:text-white transition-colors" id="nav-home">Home</a>
            <a href="/dashboard/" class="hover:text-white transition-colors" id="nav-dashboard">Dashboard</a>
            {% if session_enterprise %}
            <span class="text-brand font-medium">{{ session_enterprise }}</span>
            {% endif %}
        </div>
    </nav>

    <!-- MAIN -->
    <main class="container mx-auto px-6 py-8 max-w-5xl">
        {% block content %}{% endblock %}
    </main>

    <!-- FOOTER -->
    <footer class="text-center text-xs text-gray-600 py-6 border-t border-gray-800/50 mt-8">
        Powered by <span class="text-algo">Algorand Foundation</span>
        · <span class="text-brand-light">x402 Protocol</span>
        · <span class="text-gray-400">Google A2A</span>
    </footer>

    {% block extra_scripts %}{% endblock %}
</body>

</html>
